<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS投稿 / Meta広告 1080x1080</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans JP',sans-serif; background:#ccc; display:flex;align-items:center;justify-content:center;min-height:100vh; }

.canvas {
  width:1080px;height:1080px;
  background:linear-gradient(160deg, #1A3D28 0%, #2E5A3A 50%, #3A7A4F 100%);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
}

/* 装飾 — 浮遊サークル */
.deco-circle {
  position:absolute;border-radius:50%;
  border:1.5px solid rgba(212,168,32,0.15);
  pointer-events:none;
}
.dc1 { width:400px;height:400px;top:-80px;right:-100px; }
.dc2 { width:240px;height:240px;bottom:60px;left:-60px; }
.dc3 { width:160px;height:160px;top:300px;right:80px;background:rgba(212,168,32,0.04); }

/* 写真エリア（右） */
.photo {
  position:absolute;top:0;right:0;bottom:0;width:42%;
  background:url('megane.gif') 20% center / cover no-repeat;
}
.photo::after {
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg, #2E5A3A 0%, rgba(46,90,58,0.5) 30%, transparent 65%);
}

/* コンテンツ */
.content {
  position:relative;z-index:2;
  padding:64px 60px 52px;
  display:flex;flex-direction:column;
  flex:1;
}

/* ロゴ */
.logo { width:180px;margin-bottom:28px;opacity:.9; }

/* 期間タグ — ピル型 */
.top-row {
  display:flex;align-items:center;gap:12px;
  margin-bottom:16px;
}
.tag {
  font-weight:700;font-size:13px;color:#fff;
  letter-spacing:.14em;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  padding:8px 20px;border-radius:40px;
  border:1px solid rgba(255,255,255,0.15);
}
.date {
  font-weight:700;font-size:18px;
  color:#D4A820;letter-spacing:.04em;
}

/* GWフェア — 大胆なサイズ差 */
.title {
  font-size:130px;font-weight:900;
  line-height:.85;color:#D4A820;
  font-style:italic;
  text-shadow:0 4px 30px rgba(0,0,0,0.2);
  margin-bottom:6px;
}
.subtitle {
  font-size:18px;font-weight:500;
  letter-spacing:.32em;
  color:rgba(255,255,255,0.6);
  margin-bottom:28px;
}

/* 金額 */
.offer-row {
  display:flex;align-items:baseline;gap:4px;
  margin-bottom:6px;
}
.offer-label {
  font-size:24px;font-weight:700;
  color:rgba(255,255,255,0.5);
}
.offer-num {
  font-size:128px;font-weight:900;
  color:#fff;line-height:.8;
  letter-spacing:-.04em;
}
.offer-unit {
  font-size:40px;font-weight:900;
  color:#D4A820;margin-left:4px;
}
.offer-note {
  font-size:13px;color:rgba(255,255,255,0.4);
  margin-bottom:16px;
}

/* ハズレなしバッジ — ピル型グラスモーフィズム */
.badge {
  position:absolute;top:400px;left:580px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;
  font-weight:900;font-size:16px;
  padding:12px 28px;border-radius:40px;
  letter-spacing:.08em;
  z-index:3;
}

/* CTA — グラスモーフィズムカード */
.cta-area {
  margin-top:auto;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:28px 32px;
  max-width:520px;
}
.cta-lead {
  font-weight:900;font-size:20px;
  color:#D4A820;letter-spacing:.04em;
  margin-bottom:14px;
}
.cta-btn {
  display:inline-block;
  background:linear-gradient(135deg, #E8C030 0%, #D4A820 100%);
  color:#1A3D28;font-weight:900;font-size:22px;
  padding:18px 48px;border-radius:12px;
  letter-spacing:.06em;
  box-shadow:0 4px 20px rgba(212,168,32,0.3);
}
.cta-note {
  margin-top:10px;
  font-size:11px;color:rgba(255,255,255,0.35);
}
</style>
</head>
<body>
<div id="pw-gate" style="position:fixed;inset:0;z-index:9999;background:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:'Noto Sans JP',sans-serif;">
  <p style="font-size:14px;color:#555;margin-bottom:16px;">パスワードを入力してください</p>
  <input id="pw-input" type="password" placeholder="パスワード" style="font-size:16px;padding:12px 20px;border:2px solid #ddd;border-radius:8px;width:280px;text-align:center;">
  <button onclick="checkPw()" style="margin-top:12px;padding:10px 32px;background:#2E5A3A;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">確認</button>
  <p id="pw-err" style="color:#c00;font-size:12px;margin-top:8px;display:none;">パスワードが違います</p>
</div>
<script>
function checkPw(){var p=document.getElementById('pw-input').value;if(p==='GWaimegane'){sessionStorage.setItem('gw-auth','1');document.getElementById('pw-gate').style.display='none';}else{document.getElementById('pw-err').style.display='block';}}
if(sessionStorage.getItem('gw-auth')==='1'||location.protocol==='file:'||location.hostname==='localhost'||location.hostname==='127.0.0.1'){document.getElementById('pw-gate').style.display='none';}
document.getElementById('pw-input').addEventListener('keydown',function(e){if(e.key==='Enter')checkPw();});
</script>
<div class="canvas">
  <div class="deco-circle dc1"></div>
  <div class="deco-circle dc2"></div>
  <div class="deco-circle dc3"></div>
  <div class="photo"></div>

  <div class="content">
    <img src="logo2.gif" alt="アイメガネ" class="logo">

    <div class="top-row">
      <span class="tag">期間限定</span>
      <span class="date">4/29（火）〜5/6（火）</span>
    </div>

    <div class="title">GWフェア</div>
    <div class="subtitle">スロットクーポンキャンペーン</div>

    <div class="offer-row">
      <span class="offer-label">最大</span>
      <span class="offer-num">5,500</span>
      <span class="offer-unit">円OFF</span>
    </div>
    <div class="offer-note">※税込11,000円以上のメガネ・サングラスに使用可能</div>

    <div class="badge">ハズレなし</div>

    <div class="cta-area">
      <div class="cta-lead">予約でスロット2回引ける！</div>
      <div class="cta-btn">予約して店頭でクーポンGET</div>
      <div class="cta-note">クーポン有効期限 6/7まで ／ 他のクーポン・割引との併用不可</div>
    </div>
  </div>
</div>
</body>
</html>
