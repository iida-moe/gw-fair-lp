<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GWフェア - Pattern C（青空×ポップ）</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans JP', sans-serif; overflow-x: hidden; }

.hero {
  position: relative;
  min-height: 100vh;
  background: linear-gradient(180deg, #4FC3F7, #81D4FA, #B3E5FC, #E1F5FE);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.shimmer {
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: repeating-linear-gradient(
    120deg,
    transparent,
    transparent 40px,
    rgba(255,255,255,0.06) 40px,
    rgba(255,255,255,0.06) 80px
  );
  animation: shimmerMove 8s linear infinite;
  pointer-events: none;
}
.shimmer2 {
  position: absolute;
  top: -50%;
  left: -100%;
  width: 300%;
  height: 200%;
  background: repeating-linear-gradient(
    135deg,
    transparent,
    transparent 60px,
    rgba(255,255,255,0.08) 60px,
    rgba(255,255,255,0.08) 90px
  );
  animation: shimmerMove2 12s linear infinite;
  pointer-events: none;
}
@keyframes shimmerMove {
  0% { transform: translateX(-20%) translateY(-10%); }
  100% { transform: translateX(20%) translateY(10%); }
}
@keyframes shimmerMove2 {
  0% { transform: translateX(-10%) translateY(-5%); }
  100% { transform: translateX(15%) translateY(5%); }
}

.confetti {
  position: absolute;
  top: -10px;
  opacity: 0;
  animation: confettiFall linear forwards;
  pointer-events: none;
  z-index: 1;
}
@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  50% { opacity: 1; }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.5); }
}

.sparkle {
  position: absolute;
  pointer-events: none;
  z-index: 2;
  animation: sparkleAnim ease-in-out infinite;
}
.sparkle::before, .sparkle::after {
  content: '';
  position: absolute;
}
.sparkle::before {
  width: 100%;
  height: 30%;
  top: 35%;
  left: 0;
  border-radius: 50%;
}
.sparkle::after {
  width: 30%;
  height: 100%;
  top: 0;
  left: 35%;
  border-radius: 50%;
}
.sparkle-gold::before, .sparkle-gold::after { background: #FFD700; }
.sparkle-white::before, .sparkle-white::after { background: #fff; }
@keyframes sparkleAnim {
  0%, 100% { opacity: 0.3; transform: scale(0.5) rotate(0deg); }
  50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
}

.ring {
  position: absolute;
  border: 3px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
}
.ring1 {
  width: 300px; height: 300px;
  top: -50px; right: -80px;
  animation: floatRing 8s ease-in-out infinite;
}
.ring2 {
  width: 200px; height: 200px;
  bottom: 10%; left: -60px;
  animation: floatRing 10s ease-in-out infinite reverse;
}
.ring3 {
  width: 150px; height: 150px;
  top: 40%; right: 5%;
  animation: floatRing 12s ease-in-out infinite 2s;
}
@keyframes floatRing {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  25% { transform: translate(15px, -20px) rotate(5deg); }
  50% { transform: translate(-10px, -30px) rotate(-3deg); }
  75% { transform: translate(20px, -10px) rotate(4deg); }
}

.content {
  position: relative;
  z-index: 10;
  text-align: center;
  color: #1a237e;
  padding: 20px;
}

.period-badge {
  display: inline-block;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.7);
  border-radius: 999px;
  padding: 8px 28px;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  margin-bottom: 16px;
  color: #1565C0;
}

.gw-text {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: clamp(7rem, 20vw, 14rem);
  line-height: 0.9;
  letter-spacing: -0.02em;
  color: #1565C0;
  text-shadow: 0 4px 20px rgba(21,101,192,0.2), 0 0 40px rgba(255,255,255,0.5);
}

.fair-text {
  font-size: clamp(2.5rem, 7vw, 5rem);
  font-weight: 900;
  letter-spacing: 0.15em;
  color: #1565C0;
  text-shadow: 0 2px 10px rgba(21,101,192,0.15);
}

.sub-text {
  font-size: clamp(1rem, 3vw, 1.4rem);
  font-weight: 700;
  margin-top: 16px;
  letter-spacing: 0.1em;
  color: #1565C0;
}

.discount-section {
  margin-top: 12px;
}
.discount-label {
  font-size: clamp(1.2rem, 3vw, 1.6rem);
  font-weight: 700;
  color: #e53935;
}
.discount-amount {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: clamp(5rem, 14vw, 9rem);
  line-height: 1;
  color: #e53935;
  -webkit-text-stroke: 3px #fff;
  text-shadow: 0 4px 30px rgba(229,57,53,0.3), 0 0 60px rgba(255,255,255,0.3);
  paint-order: stroke fill;
}
.discount-unit {
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 900;
  color: #e53935;
}

.badges {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 20px;
  flex-wrap: wrap;
}
.badge {
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.7);
  border-radius: 999px;
  padding: 8px 20px;
  font-size: 0.9rem;
  font-weight: 700;
  color: #1565C0;
}

.cta-button {
  display: inline-block;
  margin-top: 28px;
  background: linear-gradient(135deg, #e53935, #c62828);
  color: #fff;
  font-size: 1.15rem;
  font-weight: 900;
  padding: 16px 48px;
  border-radius: 999px;
  text-decoration: none;
  box-shadow: 0 4px 20px rgba(229,57,53,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
  letter-spacing: 0.05em;
}
.cta-button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 30px rgba(229,57,53,0.4);
}
</style>
</head>
<body>
<section class="hero" id="hero">
  <div class="shimmer"></div>
  <div class="shimmer2"></div>
  <div class="ring ring1"></div>
  <div class="ring ring2"></div>
  <div class="ring ring3"></div>

  <div class="content">
    <div class="period-badge">4/29（火祝）〜 5/6（火振休）</div>
    <div class="gw-text">GW</div>
    <div class="fair-text">フェア</div>
    <div class="sub-text">スロットを回して</div>
    <div class="discount-section">
      <div class="discount-label">最大</div>
      <div class="discount-amount">5,500</div>
      <div class="discount-unit">円OFF</div>
    </div>
    <div class="badges">
      <span class="badge">ハズレなし</span>
      <span class="badge">2人に1人は1,100円以上OFF</span>
    </div>
    <a href="#" class="cta-button">お近くの店舗を探す</a>
  </div>
</section>

<script>
const hero = document.getElementById('hero');
const confettiColors = ['#ffffff','#FFD700','#FF69B4','#e53935','#FF8C00','#CE93D8'];
const confettiShapes = ['square','rect','circle'];

for (let i = 0; i < 75; i++) {
  const el = document.createElement('div');
  el.classList.add('confetti');
  const color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
  const shape = confettiShapes[Math.floor(Math.random() * confettiShapes.length)];
  const size = Math.random() * 8 + 4;

  el.style.left = Math.random() * 100 + '%';
  el.style.background = color;
  el.style.animationDuration = (Math.random() * 4 + 4) + 's';
  el.style.animationDelay = (Math.random() * 8) + 's';
  el.style.animationIterationCount = 'infinite';

  if (shape === 'square') {
    el.style.width = size + 'px';
    el.style.height = size + 'px';
  } else if (shape === 'rect') {
    el.style.width = size * 0.5 + 'px';
    el.style.height = size * 1.5 + 'px';
  } else {
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.borderRadius = '50%';
  }

  hero.appendChild(el);
}

// Mixed white + gold sparkles
for (let i = 0; i < 14; i++) {
  const star = document.createElement('div');
  star.classList.add('sparkle');
  star.classList.add(i % 2 === 0 ? 'sparkle-gold' : 'sparkle-white');
  const size = Math.random() * 20 + 10;
  star.style.width = size + 'px';
  star.style.height = size + 'px';
  star.style.top = Math.random() * 90 + '%';
  star.style.left = Math.random() * 95 + '%';
  star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
  star.style.animationDelay = (Math.random() * 3) + 's';
  hero.appendChild(star);
}
</script>
</body>
</html>
