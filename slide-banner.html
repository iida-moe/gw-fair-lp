<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スライドバナー / ニュース 1200x628</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans JP',sans-serif; background:#ccc; display:flex;align-items:center;justify-content:center;min-height:100vh; }

.canvas {
  width:1200px;height:628px;
  background:linear-gradient(160deg, #1A3D28 0%, #2E5A3A 50%, #3A7A4F 100%);
  position:relative;overflow:hidden;
  display:flex;
}

/* 装飾 */
.deco-circle {
  position:absolute;border-radius:50%;
  border:1.5px solid rgba(212,168,32,0.12);
  pointer-events:none;
}
.dc1 { width:320px;height:320px;top:-60px;right:-40px; }
.dc2 { width:180px;height:180px;bottom:-40px;left:360px; }

/* 写真エリア（右） */
.photo {
  position:absolute;top:0;right:0;bottom:0;width:45%;
  background:url('megane.gif') 20% center / cover no-repeat;
}
.photo::after {
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg, #2E5A3A 0%, rgba(46,90,58,0.4) 30%, transparent 60%);
}

/* コンテンツ */
.content {
  position:relative;z-index:2;
  padding:40px 48px;
  display:flex;flex-direction:column;
  max-width:62%;
}

/* ロゴ */
.logo { width:160px;margin-bottom:16px;opacity:.9; }

/* 期間タグ */
.top-row {
  display:flex;align-items:center;gap:10px;
  margin-bottom:10px;
}
.tag {
  font-weight:700;font-size:11px;color:#fff;
  letter-spacing:.14em;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  padding:6px 16px;border-radius:40px;
  border:1px solid rgba(255,255,255,0.12);
}
.date {
  font-weight:700;font-size:15px;
  color:#D4A820;letter-spacing:.04em;
}

/* GWフェア */
.title {
  font-size:84px;font-weight:900;
  line-height:.85;color:#D4A820;
  font-style:italic;
  text-shadow:0 3px 20px rgba(0,0,0,0.15);
  margin-bottom:2px;
}
.subtitle {
  font-size:14px;font-weight:500;
  letter-spacing:.3em;
  color:rgba(255,255,255,0.5);
  margin-bottom:14px;
}

/* 金額 */
.offer-row {
  display:flex;align-items:baseline;gap:3px;
  margin-bottom:4px;
}
.offer-label {
  font-size:20px;font-weight:700;
  color:rgba(255,255,255,0.5);
}
.offer-num {
  font-size:88px;font-weight:900;
  color:#fff;line-height:.8;
  letter-spacing:-.04em;
}
.offer-unit {
  font-size:32px;font-weight:900;
  color:#D4A820;margin-left:3px;
}

/* ハズレなし + 注釈 */
.bottom-row {
  display:flex;align-items:center;gap:12px;
  margin-top:4px;
}
.badge-pill {
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.15);
  color:#fff;font-weight:900;font-size:13px;
  padding:6px 18px;border-radius:40px;
  letter-spacing:.06em;
}
.offer-note {
  font-size:10px;color:rgba(255,255,255,0.4);
}

/* CTA */
.cta-area {
  margin-top:auto;
  display:flex;align-items:center;gap:16px;
}
.cta-btn {
  display:inline-block;
  background:linear-gradient(135deg, #E8C030 0%, #D4A820 100%);
  color:#1A3D28;font-weight:900;font-size:17px;
  padding:14px 36px;border-radius:10px;
  letter-spacing:.06em;
  box-shadow:0 3px 16px rgba(212,168,32,0.25);
}
.cta-sub {
  font-weight:900;font-size:14px;
  color:#D4A820;letter-spacing:.04em;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="deco-circle dc1"></div>
  <div class="deco-circle dc2"></div>
  <div class="photo"></div>

  <div class="content">
    <img src="logo2.gif" alt="アイメガネ" class="logo">

    <div class="top-row">
      <span class="tag">期間限定</span>
      <span class="date">4/29（火）〜5/6（火）</span>
    </div>

    <div class="title">GWフェア</div>
    <div class="subtitle">スロットクーポンキャンペーン</div>

    <div class="offer-row">
      <span class="offer-label">最大</span>
      <span class="offer-num">5,500</span>
      <span class="offer-unit">円OFF</span>
    </div>
    <div class="bottom-row">
      <span class="badge-pill">ハズレなし</span>
      <span class="offer-note">※税込11,000円以上のメガネ・サングラスに使用可能</span>
    </div>

    <div class="cta-area">
      <div class="cta-btn">予約して店頭でクーポンGET</div>
      <div class="cta-sub">予約でスロット2回引ける！</div>
    </div>
  </div>
</div>
</body>
</html>
